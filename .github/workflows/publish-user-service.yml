name: Publish User Service to GitHub Packages

on:
  push:
    paths:
      - 'user_service/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build package
        run: |
          cd user_service
          uv build

      - name: Publish to GitHub Packages
        env:
          UV_PUBLISH_USERNAME: PurushottamHari
          UV_PUBLISH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          UV_PUBLISH_URL: https://pypi.pkg.github.com/PurushottamHari/UnHook
        run: |
          cd user_service
          uv publish
