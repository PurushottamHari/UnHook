name: Scheduled Newspaper Processing

on:
  schedule:
    # 9 AM and 5 PM UTC daily
    - cron: '0 9,17 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  trigger-newspaper-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Newspaper Processing for User 1
        run: |
          curl --location --request POST 'https://unhook-staging-3f64.up.railway.app/internal/process_newspaper_for_user/cb2c7bc0-ff3b-4773-86d6-38b5ea8bfa48'

      - name: Trigger Newspaper Processing for User 2
        run: |
          curl --location --request POST 'https://unhook-staging-3f64.up.railway.app/internal/process_newspaper_for_user/1824c83a-308b-47e2-a098-0fc5bb03f4df'
