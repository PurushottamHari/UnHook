name: Scheduled Data Collection

on:
  schedule:
    # 8 AM and 4 PM UTC daily
    - cron: '0 8,16 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  trigger-data-collection:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Data Collection for User 1
        run: |
          curl --location --request POST 'https://unhook-staging-3f64.up.railway.app/internal/start_user_collection/cb2c7bc0-ff3b-4773-86d6-38b5ea8bfa48'

      - name: Trigger Data Collection for User 2
        run: |
          curl --location --request POST 'https://unhook-staging-3f64.up.railway.app/internal/start_user_collection/1824c83a-308b-47e2-a098-0fc5bb03f4df'
