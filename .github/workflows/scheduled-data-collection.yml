name: Scheduled Data Collection

on:
  schedule:
    # 8 AM and 4 PM UTC daily
    - cron: "0 8,16 * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  trigger-data-collection:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Data Collection for User 1
        run: |
          curl --fail --location --request POST --retry 3 --retry-delay 2 --retry-all-errors 'https://unhook-production-b172.up.railway.app/internal/start_user_collection/607d95f0-47ef-444c-89d2-d05f257d1265'

      - name: Trigger Data Collection for User 2
        run: |
          curl --fail --location --request POST --retry 3 --retry-delay 2 --retry-all-errors 'https://unhook-production-b172.up.railway.app/internal/start_user_collection/91f21ebd-73bb-49b0-82cf-a78dae3caebd'
